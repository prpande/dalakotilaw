<div class="language-dialog p-4">
  <h2 class="text-center mb-2">Choose Your Language</h2>
  <p class="text-center mb-1">भाषा चुनें</p>
  <div class="d-flex justify-content-center gap-3 mt-4">
    <button mat-raised-button color="primary" (click)="selectLanguage('en')" class="lang-btn">English</button>
    <button mat-raised-button color="primary" (click)="selectLanguage('hi')" class="lang-btn">हिन्दी</button>
  </div>
</div>
